<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geometric Quilt</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <!-- 25 divs (5x5 grid) -->
        <div class="tile square"></div>
        <div class="tile circle"></div>
        <div class="tile triangle"></div>
        <div class="tile gradient"></div>
        <div class="tile hollow"></div>

        <div class="tile circle"></div>
        <div class="tile triangle"></div>
        <div class="tile gradient"></div>
        <div class="tile hollow"></div>
        <div class="tile square"></div>

        <div class="tile triangle"></div>
        <div class="tile gradient"></div>
        <div class="tile hollow"></div>
        <div class="tile square"></div>
        <div class="tile circle"></div>

        <div class="tile gradient"></div>
        <div class="tile hollow"></div>
        <div class="tile square"></div>
        <div class="tile circle"></div>
        <div class="tile triangle"></div>

        <div class="tile hollow"></div>
        <div class="tile square"></div>
        <div class="tile circle"></div>
        <div class="tile triangle"></div>
        <div class="tile gradient"></div>
    </div>

</body>
</html>
